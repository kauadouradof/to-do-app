<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List | HTML e CSS</title>

  <style>
    /* =========================================
       RESET BÁSICO
    ========================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* =========================================
       VARIÁVEIS DE COR
    ========================================== */
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe3ec;
      --shadow: 0 10px 25px rgba(0, 0, 0, 0.08);

      --low-bg: #e8f7ea;
      --low-text: #1f7a3a;

      --medium-bg: #fff4d6;
      --medium-text: #8a5a00;

      --high-bg: #ffe1e1;
      --high-text: #b42318;

      --primary: #2563eb;
      --primary-hover: #1d4ed8;
    }

    /* =========================================
       CORPO DA PÁGINA
    ========================================== */
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef4ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    /* =========================================
       CABEÇALHO
    ========================================== */
    .hero {
      text-align: center;
      margin-bottom: 24px;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      color: #111827;
    }

    .hero p {
      color: var(--muted);
      font-size: 1rem;
      max-width: 700px;
      margin: 0 auto;
      line-height: 1.5;
    }

    /* =========================================
       GRID PRINCIPAL
    ========================================== */
    .layout {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    /* =========================================
       CARTÕES
    ========================================== */
    .card {
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 1.2rem;
      margin-bottom: 14px;
      color: #111827;
    }

    .card-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* =========================================
       FORMULÁRIO (INTERFACE)
       Observação: sem JS, a interface é visual
    ========================================== */
    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    input[type="text"],
    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background-color: #fff;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .btn-primary {
      background-color: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-secondary {
      background-color: #eef2ff;
      color: #3730a3;
    }

    .btn-secondary:hover {
      background-color: #e0e7ff;
    }

    .note {
      margin-top: 14px;
      padding: 12px 14px;
      border-left: 4px solid var(--primary);
      background-color: #eff6ff;
      color: #1e3a8a;
      border-radius: 8px;
      font-size: 0.93rem;
      line-height: 1.5;
    }

    /* =========================================
       RESUMO LATERAL
    ========================================== */
    .summary {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background-color: #fafcff;
    }

    .summary-item strong {
      display: block;
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .summary-item span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    /* =========================================
       LEGENDA DE PRIORIDADE
    ========================================== */
    .legend {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      color: var(--text);
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-low {
      background-color: #22c55e;
    }

    .dot-medium {
      background-color: #f59e0b;
    }

    .dot-high {
      background-color: #ef4444;
    }

    /* =========================================
       LISTA DE TAREFAS
    ========================================== */
    .tasks-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tasks-header p {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .task-list {
      list-style: none;
      display: grid;
      gap: 14px;
    }

    .task-item {
      position: relative;
    }

    .task-check {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .task-card {
      display: grid;
