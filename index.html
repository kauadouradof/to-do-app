<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tarefas</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
        }

        .form {
            max-width: 400px;
            margin: 20px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .board {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .coluna {
            flex: 1;
            background: white;
            padding: 10px;
            border-radius: 10px;
            min-height: 200px;
        }

        .coluna h2 {
            text-align: center;
        }

        .tarefa {
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            color: white;
            animation: fadeIn 0.3s;
        }

        .baixa { background: #38a169; }
        .media { background: #d69e2e; }
        .alta { background: #e53e3e; }

        small {
            display: block;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-5px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>

    <h1>📋 Minhas Tarefas</h1>

    <div class="form">
        <input type="text" id="tarefaInput" placeholder="Digite a tarefa">
        <input type="date" id="dataTarefa">

        <select id="prioridade">
            <option value="baixa">🟢 Baixa</option>
            <option value="media">🟡 Média</option>
            <option value="alta">🔴 Alta</option>
        </select>

        <button onclick="adicionarTarefa()">Adicionar</button>
    </div>

    <div class="board">
        <div class="coluna" id="baixaCol">
            <h2>🟢 Baixa</h2>
        </div>

        <div class="coluna" id="mediaCol">
            <h2>🟡 Média</h2>
        </div>

        <div class="coluna" id="altaCol">
            <h2>🔴 Alta</h2>
        </div>
    </div>

    <script>
        function adicionarTarefa() {
            const texto = document.getElementById("tarefaInput").value;
            const data = document.getElementById("dataTarefa").value;
            const prioridade = document.getElementById("prioridade").value;

            if (texto.trim() === "" || data === "") {
                alert("Preencha todos os campos!");
                return;
            }

            const tarefa = document.createElement("div");
            tarefa.classList.add("tarefa", prioridade);

            tarefa.innerHTML = `
                <strong>${texto}</strong>
                <small>📅 ${data}</small>
            `;

            // Escolhe coluna correta
            if (prioridade === "baixa") {
                document.getElementById("baixaCol").appendChild(tarefa);
            } else if (prioridade === "media") {
                document.getElementById("mediaCol").appendChild(tarefa);
            } else {
                document.getElementById("altaCol").appendChild(tarefa);
            }

            document.getElementById("tarefaInput").value = "";
            document.getElementById("dataTarefa").value = "";
        }
    </script>

</body>
</html>
